services:
    ubuntu.22.04:
        build: ubuntu.22.04
        image: docker.packages.octopushq.com/octopusdeploy/worker-tools:${BUILD_NUMBER?err}-ubuntu.22.04
        volumes:
          - ./ubuntu.22.04:/app
        working_dir: /app
        entrypoint: ["pwsh", "-file", "scripts/run-tests.ps1"]
  
    ubuntu.24.04-amd64:
      build:
        context: ./ubuntu.24.04
        args:
          TARGETPLATFORM: linux/amd64
      image: docker.packages.octopushq.com/octopusdeploy/worker-tools:${BUILD_NUMBER?err}-ubuntu.24.04-amd64
      volumes:
        - ./ubuntu.24.04:/app
      working_dir: /app
      entrypoint: ["pwsh", "-file", "scripts/run-tests.ps1"]

    ubuntu.24.04-arm64:
      build:
        context: ./ubuntu.24.04
        args:
          TARGETPLATFORM: linux/arm64
      image: docker.packages.octopushq.com/octopusdeploy/worker-tools:${BUILD_NUMBER?err}-ubuntu.24.04-arm64
      volumes:
        - ./ubuntu.24.04:/app
      working_dir: /app
      entrypoint: ["pwsh", "-file", "scripts/run-tests.ps1"]


    windows.ltsc2022:
        build: windows.ltsc2022
        image: docker.packages.octopushq.com/octopusdeploy/worker-tools:${BUILD_NUMBER?err}-windows.ltsc2022
        volumes:
          - "./windows.ltsc2022:c:\\app"
        working_dir: "c:\\app"
        entrypoint: ["pwsh", "-file", "scripts/run-tests.ps1"]

    windows.ltsc2025:
        build: windows.ltsc2025
        image: docker.packages.octopushq.com/octopusdeploy/worker-tools:${BUILD_NUMBER?err}-windows.ltsc2025
        volumes:
          - "./windows.ltsc2025:c:\\app"
        working_dir: "c:\\app"
        entrypoint: ["pwsh", "-file", "scripts/run-tests.ps1"]
